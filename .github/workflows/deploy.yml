name: Deploy

on:
  push:
    branches: ["main"]
  release:
    types: [published]

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    concurrency: deploy-group
    environment:
      name: production
      url: https://crit.md
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Register Sentry release
        uses: getsentry/action-release@v3
        with:
          environment: production
          version: ${{ github.sha }}
          projects: crit-web-backend crit-web-frontend
          set_commits: auto
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: crit-md
      - name: Restore dependencies cache
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
            assets/node_modules
          key: ${{ runner.os }}-deploy-${{ hashFiles('**/mix.lock', 'assets/package-lock.json') }}
      - name: Upload frontend source maps
        env:
          MIX_ENV: prod
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get --only "$MIX_ENV"
          mix assets.setup
          npm ci --prefix assets
          mix compile
          mix assets.deploy
          npx --yes @sentry/cli@2 sourcemaps upload \
            --org crit-md \
            --project crit-web-frontend \
            --release "${{ github.sha }}" \
            --url-prefix '~/assets/js' \
            priv/static/assets/js
      - run: |
          flyctl deploy --remote-only \
            --build-arg SENTRY_RELEASE=${{ github.sha }} \
            --build-secret SENTRY_AUTH_TOKEN="${SENTRY_AUTH_TOKEN}" \
            --env SENTRY_RELEASE=${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' && github.event.release.prerelease == false }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
